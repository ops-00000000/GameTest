<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♟ Chess Roguelike — Шахматное Подземелье</title>
  <meta name="description" content="Пошаговый рогалик с шахматными механиками и онлайн-мультиплеером" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- ═══ Menu Screen ═══ -->
  <div id="menu-screen" class="screen active">
    <div class="menu-container">
      <div class="menu-logo">
        <div class="logo-pieces">♚♛♜♝♞♟</div>
        <h1>CHESS<br />ROGUELIKE</h1>
        <p class="subtitle">Шахматное Подземелье</p>
      </div>
      <div class="menu-form">
        <div class="input-group">
          <label for="player-name">Имя рыцаря</label>
          <input type="text" id="player-name" placeholder="Введите имя..." maxlength="20" />
        </div>
        <div class="input-group">
          <label for="room-id">ID комнаты</label>
          <input type="text" id="room-id" placeholder="Оставьте пустым для новой..." maxlength="30" />
        </div>
        <button id="btn-join" class="btn-primary">
          <span class="btn-icon">⚔️</span> Вступить в бой
        </button>
      </div>
      <div class="menu-footer">
        <p>WASD/Стрелки — движение • E — подобрать • I — инвентарь • Space — пропустить ход</p>
      </div>
    </div>
  </div>

  <!-- ═══ Game Screen ═══ -->
  <div id="game-screen" class="screen">
    <div id="game-layout">
      <!-- Left sidebar: info -->
      <div id="sidebar-left">
        <div class="panel" id="panel-player">
          <h3 id="player-info-name">♟ Пешка</h3>
          <div class="stat-row">
            <span>⭐ XP: <strong id="xp-text">0/10</strong></span>
            <span>🏰 Этаж: <strong id="floor-text">1</strong></span>
          </div>
          <div class="stat-row">
            <span>⚔️ Захватов: <strong id="captures-text">0</strong></span>
          </div>
        </div>
        <div class="panel" id="panel-inventory">
          <h3>🎒 Инвентарь</h3>
          <div id="inventory-list" class="inventory-grid"></div>
        </div>
        <div class="panel" id="panel-turn">
          <div id="turn-indicator" class="turn-indicator">Ваш ход!</div>
          <div id="turn-number">Ход #0</div>
        </div>
      </div>

      <!-- Center: Canvas -->
      <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
      </div>

      <!-- Right sidebar: log -->
      <div id="sidebar-right">
        <div class="panel" id="panel-log">
          <h3>📜 Журнал</h3>
          <div id="game-log"></div>
        </div>
        <div class="panel" id="panel-chat">
          <h3>💬 Чат</h3>
          <div id="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="200" />
            <button id="btn-chat-send" class="btn-small">→</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Promotion Modal ═══ -->
  <div id="promotion-modal" class="modal hidden">
    <div class="modal-content">
      <h2>👑 Повышение!</h2>
      <p>Выберите новую фигуру:</p>
      <div id="promotion-options" class="promotion-grid"></div>
    </div>
  </div>

  <!-- ═══ Connection Status ═══ -->
  <div id="connection-status" class="connection-status hidden">
    <span id="connection-text">Подключение...</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
